<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    
    <!--header section-->
    <header>
      <nav class="nav-bar">
        <div class="nav__header">
          <div class="nav__logo">
            <a href="#" class="logo">
              <img src="assets/logo-white.png" alt="logo" class="logo-white" />
              <img src="assets/logo-dark.png" alt="logo" class="logo-dark" />
              <span>Kangra Drives</span>
            </a>
          </div>
          <div class="nav__menu__btn" id="menu-btn">
            <i class="ri-menu-line"></i>
          </div>
        </div>
        <ul class="nav__links" id="nav-links">
          <li><a href="login.html">Login</a></li>
        </ul>
        <div class="nav__btns">
         <a href="login.html"><button class="btn">Login</button></a>
        </div>
      </nav>
    </header>
    <!-- header section end -->

     <!-- Register_section -->
     <section class="register" id="register"> 
      <div class="register__content">
        <h2 class="section__header aa">Create Account</h2>
        <form class="register-form">
           <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="email@example.com" required>
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div>
                <button class="btn-register" onclick="window.location.href='index.html'">Sign Up</button>
            </div>
            <p class="login-link">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </form>
      </div>
    </section>


</body>
</html>
