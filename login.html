<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login page</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background: linear-gradient(135deg,#0d2de6,#5714ff4e);
}

.login-box{
  background: rgb(243, 226, 226);
  backdrop-filter: blur(15px);
  padding:30px;
  width:280px;
  border-radius:15px;
  text-align:center;
  color:#000000;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  outline:none;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#345fed;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>LOGIN</h2>
  
  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">
  
  <button onclick="goToMain()">Login</button>
</div>

<script>
function goToMain(){
    localStorage.setItem("isLoggedIn", "true");  // Set login status
    
  window.location.href = "index.html";  // Redirect to main page
}
</script>

</body>
</html>
